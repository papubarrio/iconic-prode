services:
  - type: web
    name: iconic-prode
    runtime: node
    rootDir: .
    buildCommand: npm run build && cd backend && npm install
    startCommand: cd backend && node server.js
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: FOOTBALL_API_KEY
        value: 95c8c99cbd564123811bf4397373d2aa
      - key: NODE_ENV
        value: production
